<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FSSM RESULT CHECKER</title>
  <style>
    /* Your CSS stays 100% same - no change */
    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      padding: 0;
      background: #f4f7f4;
      color: #1a1a1a;
    }
    .header {
      background: #0b5d1e;
      color: white;
      padding: 20px;
      text-align: center;
      border-bottom: 4px solid #d4af37;
    }
    .logo {
      width: 100px;
      height: 100px;
      background: white;
      border-radius: 50%;
      margin: 0 auto 15px auto;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      color: #0b5d1e;
      font-size: 24px;
      border: 3px solid #d4af37;
    }
    h1 { margin: 0; font-size: 28px; letter-spacing: 1px; }
    h2 {
      background: #064014;
      color: #f4f7f4;
      margin: 0 0 25px 0;
      padding: 12px 20px;
      font-size: 18px;
      text-align: center;
      font-weight: 600;
    }
    #search {
      display: block;
      padding: 14px 16px;
      width: 80%;
      max-width: 500px;
      margin: 0 auto 10px auto;
      border: 2px solid #0b5d1e;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      outline: none;
      transition: 0.2s;
    }
    #search:focus {
      border-color: #d4af37;
      box-shadow: 0 0 0 3px rgba(11, 93, 30, 0.2);
    }
    .search-hint {
      text-align: center;
      color: #666;
      font-size: 14px;
      margin-bottom: 30px;
    }
    #pest-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 0 20px 30px 20px;
    }
    .result-card {
      background: white;
      padding: 25px;
      margin-bottom: 15px;
      border-radius: 10px;
      border: 1px solid #ddd;
      border-left: 6px solid #0b5d1e;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .student-info { margin-bottom: 20px; }
    .student-info h3 { margin: 0 0 10px 0; color: #0b5d1e; font-size: 22px; }
    .student-info p { margin: 6px 0; font-size: 16px; }
    .semester-title {
      background: #064014;
      color: white;
      padding: 8px 15px;
      margin: 25px 0 10px 0;
      border-radius: 5px;
      font-weight: bold;
    }
    .result-table {
      width: 100%;
      border-collapse: collapse;
      margin: 10px 0 20px 0;
      font-size: 15px;
    }
    .result-table th {
      background: #0b5d1e;
      color: white;
      padding: 12px 8px;
      text-align: left;
      border: 1px solid #ddd;
    }
    .result-table td {
      padding: 10px 8px;
      border: 1px solid #ddd;
    }
    .result-table tr:nth-child(even) { background: #f9f9f9; }
    .carry-over {
      background: #ffebee !important;
      color: #c62828;
      font-weight: bold;
    }
    .summary-box {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }
    .summary-item {
      background: #f0f9f0;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
      border: 2px solid #0b5d1e;
    }
    .summary-item h4 {
      margin: 0 0 5px 0;
      color: #0b5d1e;
      font-size: 14px;
    }
    .summary-item p {
      margin: 0;
      font-size: 24px;
      font-weight: bold;
      color: #064014;
    }
    .not-found, .loading {
      background: #f0f9f0;
      color: #8b0000;
      font-weight: bold;
      text-align: center;
      padding: 20px;
      border-radius: 8px;
      border: 2px solid #0b5d1e;
    }
    .loading { color: #0b5d1e; }
    .print-btn {
      background: #0b5d1e;
      color: white;
      border: none;
      padding: 12px 25px;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 15px;
      transition: 0.2s;
    }
    .print-btn:hover { background: #064014; }
    @media print {
      body { background: white; }
      .header, h2, #search, .search-hint, .print-btn { display: none; }
      .result-card { box-shadow: none; border: 2px solid #000; page-break-inside: avoid; }
    }
  img{
    height:100px;
    width:100px;
    border-radius:100%;
  }
  </style>
</head>
<body>

  <div class="header">
    <div class="logo"><img src="logo.jpg"></div>
    <h1>Federal School of Statistics</h1>
  </div>
  
  <h2>ND TWO (2) COMPUTER SCIENCE RESULT CHECKER</h2>

  <input type="text" id="search" placeholder="Enter Matric Number" inputmode="numeric">
  <p class="search-hint">Numbers only - Example: 001</p>

  <div id="pest-container"></div>

  <script>
    const gradePoints = {
      'A': 4.0, 'AB': 3.5, 'B': 3.0, 'BC': 2.5, 'C': 2.0, 
      'CD': 1.5, 'D': 1.0, 'E': 0.5, 'F': 0
    };

    let Student_result = []; // Will load from JSON

    // Load results from external JSON file
    async function loadResults() {
      const container = document.getElementById('pest-container');
      try {
        container.innerHTML = '<p class="loading">Loading results...</p>';
        const response = await fetch('results.json');
        
        if (!response.ok) {
          throw new Error(`HTTP error! Status: ${response.status}`);
        }
        
        Student_result = await response.json();
        container.innerHTML = '';
      } catch (error) {
        console.error('Failed to load results.json:', error);
        container.innerHTML = '<p class="not-found">Error loading results.</p>';
      }
    }

    function calculateSemester(courses) {
      let totalPoints = 0;
      let totalUnits = 0;
      let carryOvers = 0;

      courses.forEach(course => {
        const points = gradePoints[course.grade] || 0;
        totalPoints += points * course.unit;
        totalUnits += course.unit;
        if (course.grade === 'F') carryOvers++;
      });

      const gpa = totalUnits > 0 ? (totalPoints / totalUnits).toFixed(2) : 0.00;
      return { gpa, totalUnits, totalPoints, carryOvers };
    }

    function calculateAllSemesters(semesters) {
      let cumulativePoints = 0;
      let cumulativeUnits = 0;
      let totalCarryOvers = 0;
      let semesterResults = [];

      semesters.forEach(sem => {
        const calc = calculateSemester(sem.Courses);
        cumulativePoints += calc.totalPoints;
        cumulativeUnits += calc.totalUnits;
        totalCarryOvers += calc.carryOvers;
        
        semesterResults.push({
          name: sem.name,
          courses: sem.Courses,
          gpa: calc.gpa,
          units: calc.totalUnits
        });
      });

      const cgpa = cumulativeUnits > 0 ? (cumulativePoints / cumulativeUnits).toFixed(2) : 0.00;
      
      return {
        semesterResults,
        cgpa,
        totalUnits: cumulativeUnits,
        totalCarryOvers
      };
    }

    function displayStudent(student) {
      const container = document.getElementById('pest-container');
      container.innerHTML = '';

      if (student) {
        const results = calculateAllSemesters(student.Semesters);
        
        let semesterTables = '';
        results.semesterResults.forEach(sem => {
          let tableRows = '';
          sem.courses.forEach(course => {
            const isCarryOver = course.grade === 'F';
            tableRows += `
              <tr class="${isCarryOver ? 'carry-over' : ''}">
                <td>${course.code}</td>
                <td>${course.title}</td>
                <td>${course.unit}</td>
                <td>${course.grade}</td>
                <td>${(gradePoints[course.grade] * course.unit).toFixed(1)}</td>
              </tr>
            `;
          });

          semesterTables += `
            <div class="semester-title">${sem.name} - GPA: ${sem.gpa} | Units: ${sem.units}</div>
            <table class="result-table">
              <thead>
                <tr>
                  <th>Course Code</th>
                  <th>Course Title</th>
                  <th>Unit</th>
                  <th>Grade</th>
                  <th>Points</th>
                </tr>
              </thead>
              <tbody>${tableRows}</tbody>
            </table>
          `;
        });

        const div = document.createElement('div');
        div.classList.add('result-card');
        div.innerHTML = `
          <div class="student-info">
            <h3>${student.student_name}</h3>
            <p><strong>Matric No:</strong> ${student.Matrick_No}</p>
            <p><strong>Department:</strong> ${student.Department}</p>
            <p><strong>Level:</strong> ${student.Level}</p>
          </div>

          ${semesterTables}

          <div class="summary-box">
            <div class="summary-item">
              <h4>Final CGPA</h4>
              <p>${results.cgpa}</p>
            </div>
            <div class="summary-item">
              <h4>Total Units</h4>
              <p>${results.totalUnits}</p>
            </div>
            <div class="summary-item">
              <h4>Total Carry Overs</h4>
              <p>${results.totalCarryOvers}</p>
            </div>
          </div>

          <button class="print-btn" onclick="window.print()">Print Result</button>
        `;
        container.appendChild(div);
      }
    }

    document.getElementById('search').addEventListener('input', function () {
      this.value = this.value.replace(/[^0-9]/g, '');
      
      const value = this.value.trim();
      const container = document.getElementById('pest-container');
      
      if (value === '') {
        container.innerHTML = '';
        return;
      }

      // Make sure results are loaded first
      if (Student_result.length === 0) {
        container.innerHTML = '<p class="loading">Results not loaded yet. Please wait...</p>';
        return;
      }

      const found = Student_result.find(student => 
        student.Matrick_No === value
      );

      if (found) {
        displayStudent(found);
      } else {
        container.innerHTML = '<p class="not-found">No student found with Matric No: ' + value + '</p>';
      }
    });

    // Load results when page opens
    window.addEventListener('DOMContentLoaded', loadResults);
  </script>

</body>
</html>
